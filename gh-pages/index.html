<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Displate · Internal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #005EFF;
    --cyan: #55FCFF;
    --wall: #F4F2EB;
    --dark: #121212;
    --mid: #2a2a2a;
    --muted: #6b6b6b;
    --red: #EA0307;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    background: var(--dark);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Background decoration */
  body::before {
    content: '';
    position: absolute;
    top: -120px; right: -120px;
    width: 480px; height: 480px;
    border-radius: 50%;
    background: var(--blue);
    opacity: 0.12;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -80px;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: var(--cyan);
    opacity: 0.05;
    pointer-events: none;
  }

  .card {
    background: var(--wall);
    width: 100%;
    max-width: 420px;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  .card-header {
    background: var(--dark);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 32px 36px 28px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.06em;
    margin-bottom: 20px;
  }

  .card-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    line-height: 1.15;
    margin-bottom: 6px;
  }

  .card-header h1 span { color: var(--cyan); }

  .card-header p {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  .card-body {
    padding: 32px 36px 36px;
  }

  .field-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
  }

  .field-wrap {
    position: relative;
    margin-bottom: 20px;
  }

  input[type="password"] {
    width: 100%;
    background: #fff;
    border: 1.5px solid rgba(0,0,0,0.12);
    border-radius: 8px;
    padding: 13px 48px 13px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--dark);
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input[type="password"]:focus {
    border-color: var(--blue);
  }

  input[type="password"].error {
    border-color: var(--red);
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .toggle-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--muted);
    display: flex;
    align-items: center;
  }

  .toggle-btn:hover { color: var(--dark); }

  .error-msg {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--red);
    margin-top: -14px;
    margin-bottom: 16px;
    display: none;
    letter-spacing: 0.04em;
  }

  .error-msg.visible { display: block; }

  .submit-btn {
    width: 100%;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .submit-btn:hover { opacity: 0.88; }
  .submit-btn:active { transform: scale(0.98); }

  .footer-note {
    margin-top: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.25);
    text-align: center;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="logo">DISPLATE</div>
    <h1>Internal <span>docs</span></h1>
    <p>Restricted access · Enter password to continue</p>
  </div>
  <div class="card-body">
    <label class="field-label" for="password">Password</label>
    <div class="field-wrap">
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
      <button class="toggle-btn" type="button" id="toggleBtn" aria-label="Show password">
        <!-- Eye icon -->
        <svg id="eyeIcon" width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M2 10s3.5-6 8-6 8 6 8 6-3.5 6-8 6-8-6-8-6z"/>
          <circle cx="10" cy="10" r="2.5"/>
        </svg>
      </button>
    </div>
    <div class="error-msg" id="errorMsg">Incorrect password — try again</div>
    <button class="submit-btn" id="submitBtn">ENTER</button>
    <div class="footer-note">Internal use only · Not for distribution</div>
  </div>
</div>

<script>
// SHA-1 implementation (no external deps)
async function sha1(str) {
  const enc = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest('SHA-1', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

const input = document.getElementById('password');
const btn = document.getElementById('submitBtn');
const err = document.getElementById('errorMsg');
const toggleBtn = document.getElementById('toggleBtn');

// Toggle password visibility
toggleBtn.addEventListener('click', () => {
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  toggleBtn.setAttribute('aria-label', isText ? 'Show password' : 'Hide password');
});

async function attempt() {
  const hash = await sha1(input.value);
  const url = hash + '/index.html';
  try {
    const res = await fetch(url, { method: 'HEAD' });
    if (res.ok) {
      window.location.href = url;
    } else {
      showError();
    }
  } catch {
    showError();
  }
}

function showError() {
  input.classList.add('error');
  err.classList.add('visible');
  input.value = '';
  input.focus();
  setTimeout(() => input.classList.remove('error'), 400);
}

btn.addEventListener('click', attempt);
input.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
input.addEventListener('input', () => err.classList.remove('visible'));
</script>
</body>
</html>
